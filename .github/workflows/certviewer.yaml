name: "certviewer-CI"

on:
  push:
    branches: ['**']
  pull_request:
  release:
    types: [published]

env:
  NON_INTERACTIVE: 1

jobs:
  build:
    name: Build
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release, Debug]
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - uses: nuget/setup-nuget@v2
      - run: nuget restore CertViewer.sln
      - run: msbuild /t:Rebuild /p:Configuration=${{ matrix.configuration }} /p:Platform="Any CPU" /p:EnableCosturaFody="true" CertViewer.sln
      - uses: actions/upload-artifact@v4
        with:
          name: certviewer.${{ matrix.configuration }}
          path: bin\${{ matrix.configuration }}\
